<!doctype html>
<html lang="de">
<head>

      --text: #181c28;

      --blue: #3068e0;
    }

    @media (prefers-color-scheme: dark) {

        --text: #e8edf5;

      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    main {
      max-width: 40rem;
      text-align: center;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--blue);
      font-weight: 600;
    }

<body>
  <main>
